[demos.vst2-scan-smoke]
title = "VST2 scan smoke"
summary = "Builds the repo VST2 fixture and proves Keepsake exposes it through the CLAP factory."
proof = "Headless proof that scan-path override, VST2 metadata extraction, and CLAP descriptor exposure still work together."
owner = "platform"
mode = "headless"
status = "ready"
covers = ["keepsake.vst2.scan", "keepsake.clap.factory"]
tags = ["smoke", "vst2", "headless", "macos", "linux"]
prerequisites = [
  "Run on macOS or Linux.",
  "CMake toolchain and network access for first configure must be available.",
]
artifacts = [
  ".effigy/demo/artifacts/shared/vst2-host-stack-configure.log",
  ".effigy/demo/artifacts/shared/vst2-host-stack-build.log",
  ".effigy/demo/artifacts/vst2-scan-smoke/clap-scan.txt",
]
run = [
  { task = "demo:build:vst2-host-stack" },
  { run = "mkdir -p .effigy/demo/artifacts/vst2-scan-smoke" },
  { run = "env KEEPSAKE_VST2_PATH=\"$(./tools/demo-asset-path.sh vst2-fixture)\" ./tools/demo-capture.sh .effigy/demo/artifacts/vst2-scan-smoke/clap-scan.txt ./build/clap-scan $(./tools/demo-asset-path.sh clap-bundle)" },
]

