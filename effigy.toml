# Apply this template to a single repo or to the repo that actually owns the
# Northstar docs contract. For a thin workspace container, keep only the routing
# tasks you need and do not copy this whole file blindly.

[catalog]
alias = "keepsake"

[manifest]
minimum_effigy_version = "0.7.0"
include = [
  "tasks/effigy.tasks.toml",
  "demos/effigy.demos.toml",
  "docs/effigy.docs.toml",
  "release/effigy.release.toml",
]
